# Alembic Configuration File
# Database migration tool for version-controlled schema changes

[alembic]
# Where migration scripts are stored
script_location = alembic

# Database URL - reads from environment variable
# %(DB_URL)s will be replaced by the value in env.py
sqlalchemy.url = %(DB_URL)s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S